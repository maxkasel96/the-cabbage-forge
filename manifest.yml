modules:
  confluence:backgroundScript:
    - key: the-cabbage-confluence-background-script
      resource: bgScriptResource

  confluence:homepageFeed:
    - key: the-cabbage-confluence-background-script-homepage-feed
      title: the-cabbage
      description: Homepage feed that talks with a background script
      resource: homepageFeedResource

  webtrigger:
    - key: docs-sync-trigger
      function: docs-sync-handler
      response:
        type: dynamic

  function:
    - key: docs-sync-handler
      handler: index.handleDocsSync

resources:
  - key: bgScriptResource
    path: static/background-script/build
  - key: homepageFeedResource
    path: static/homepage-feed/build

permissions:
  scopes:
    - read:space:confluence
    - read:page:confluence
    - write:page:confluence

app:
  runtime:
    name: nodejs22.x
  id: ari:cloud:ecosystem::app/fb9f212f-0d7c-459c-af08-ded8659e5b47
